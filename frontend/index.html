<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>UVita</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif;
           background: #f2f2f7; color: #1c1c1e; }
    header { background: #fff; padding: 52px 20px 14px;
             border-bottom: 0.5px solid #e0e0e0; }
    header h1 { font-size: 30px; font-weight: 800; }
    header p  { font-size: 13px; color: #8e8e93; margin-top: 2px; }
    main { padding: 14px; max-width: 460px; margin: 0 auto; }
    .card { background: #fff; border-radius: 16px;
            padding: 16px; margin-bottom: 12px; }
    .lbl  { font-size: 11px; font-weight: 600; color: #8e8e93;
            text-transform: uppercase; letter-spacing: .05em;
            margin-bottom: 8px; }
    .big  { font-size: 52px; font-weight: 800; line-height: 1; }
    .unit { font-size: 15px; color: #8e8e93; margin-top: 4px; }
    .badge { display: inline-block; font-size: 13px; font-weight: 600;
             padding: 3px 12px; border-radius: 99px; margin-top: 8px; }
    .opt { width: 100%; text-align: left; background: #f2f2f7;
           border: 1.5px solid transparent; border-radius: 12px;
           padding: 11px 14px; margin-bottom: 7px; font-size: 14px;
           cursor: pointer; display: flex;
           justify-content: space-between; align-items: center; }
    .opt.sel { background: #e8f4ff; border-color: #007aff;
               color: #007aff; font-weight: 600; }
    .ck { display: none; }
    .opt.sel .ck { display: inline; }
    .btn { width: 100%; padding: 15px; background: #007aff;
           color: #fff; border: none; border-radius: 14px;
           font-size: 17px; font-weight: 600; cursor: pointer;
           margin-top: 4px; }
    .btn:disabled { background: #aeaeb2; }
    .gps-row { display: flex; align-items: center; gap: 8px;
               font-size: 13px; color: #8e8e93; margin-bottom: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%;
           background: #aeaeb2; }
    .dot.on { background: #34c759; }
    .prow { display: flex; gap: 8px; margin-bottom: 10px; }
    .prow select, .prow input {
      flex: 1; padding: 9px 11px; background: #f2f2f7;
      border: none; border-radius: 10px; font-size: 14px; }
    #err { color: #ff3b30; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
<header>
  <h1>UVita</h1>
  <p>Vitamin D Estimation System</p>
</header>
<main>
  <div class="gps-row">
    <div class="dot" id="dot"></div>
    <span id="gps-txt">Waiting for GPS...</span>
  </div>

  <div class="card">
    <div class="lbl">UV Index today</div>
    <div class="big" id="uvi-n">—</div>
    <div class="unit" id="uvi-u">tap below to load</div>
    <span class="badge" id="uvi-b"></span>
  </div>

  <div class="card">
    <div class="lbl">Estimated vitamin D</div>
    <div class="big" id="vd-n">—</div>
    <div class="unit">nmol/L (estimated)</div>
    <span class="badge" id="vd-b"></span>
    <div style="display:flex;justify-content:space-between;
                padding:9px 0;margin-top:10px;font-size:14px">
      <span style="color:#8e8e93">Daylight hours</span>
      <span style="font-weight:600" id="dl">—</span>
    </div>
  </div>

  <div class="card">
    <div class="lbl">Your profile</div>
    <div class="prow">
      <input type="number" id="age" value="22"
             min="10" max="90" placeholder="Age">
      <select id="skin">
        <option value="I-II">Skin I–II (fair)</option>
        <option value="III-VI">Skin III–VI (medium/dark)</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="lbl">What are you wearing today?</div>
    <button class="opt sel" data-bsa="0.45" onclick="pick(this)">
      Tank top + shorts <span class="ck">✓</span>
    </button>
    <button class="opt" data-bsa="0.30" onclick="pick(this)">
      T-shirt + shorts <span class="ck">✓</span>
    </button>
    <button class="opt" data-bsa="0.20" onclick="pick(this)">
      T-shirt + pants <span class="ck">✓</span>
    </button>
    <button class="opt" data-bsa="0.10" onclick="pick(this)">
      Long sleeves + pants <span class="ck">✓</span>
    </button>
    <button class="opt" data-bsa="0.05" onclick="pick(this)">
      Full coverage / hoodie <span class="ck">✓</span>
    </button>
  </div>

  <button class="btn" id="btn" onclick="go()" disabled>
    Get my estimate
  </button>
  <p id="err"></p>
</main>

<script>
  // ← CHANGE THIS LINE after you start ngrok in step 7
  const BACKEND = "https://coherent-evolution-lunchtime.ngrok-free.dev";

  let lat = null, lon = null, bsa = 0.45;

  navigator.geolocation.getCurrentPosition(
    p => {
      lat = p.coords.latitude;
      lon = p.coords.longitude;
      document.getElementById("dot").classList.add("on");
      document.getElementById("gps-txt").textContent =
        "GPS ready — " + lat.toFixed(3) + ", " + lon.toFixed(3);
      document.getElementById("btn").disabled = false;
    },
    () => {
      document.getElementById("gps-txt").textContent =
        "Location denied — go to Settings > Safari > Location > Allow";
    }
  );

  function pick(el) {
    document.querySelectorAll(".opt")
      .forEach(b => b.classList.remove("sel"));
    el.classList.add("sel");
    bsa = parseFloat(el.dataset.bsa);
  }

  async function go() {
    const btn = document.getElementById("btn");
    const err = document.getElementById("err");
    btn.disabled = true;
    btn.textContent = "Loading...";
    err.textContent = "";
    try {
      const res = await fetch(BACKEND + "/estimate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          lat, lon, bsa,
          age:  parseInt(document.getElementById("age").value),
          skin: document.getElementById("skin").value
        })
      });
      if (!res.ok) throw new Error("Server error " + res.status);
      const d = await res.json();

      const [uc, ul] = uviInfo(d.uvi);
      document.getElementById("uvi-n").textContent = d.uvi.toFixed(1);
      document.getElementById("uvi-u").textContent = ul;
      const ub = document.getElementById("uvi-b");
      ub.textContent = ul;
      ub.style.cssText = uviStyle(uc);

      const [vc, vl] = vdInfo(d.vitamin_d_nmol_l);
      document.getElementById("vd-n").textContent =
        d.vitamin_d_nmol_l.toFixed(0);
      const vb = document.getElementById("vd-b");
      vb.textContent = vl;
      vb.style.cssText = vdStyle(vc);
      document.getElementById("dl").textContent =
        d.daylight_hours.toFixed(1) + " hrs";

    } catch(e) {
      err.textContent = "Cannot reach server — is Flask running?";
    }
    btn.disabled = false;
    btn.textContent = "Refresh estimate";
  }

  function uviInfo(v) {
    if (v < 3) return ["g", "Low"];
    if (v < 6) return ["y", "Moderate"];
    if (v < 8) return ["o", "High"];
    return ["r", "Very High"];
  }
  function vdInfo(v) {
    if (v < 30) return ["r", "Deficient (<30 nmol/L)"];
    if (v < 50) return ["y", "Insufficient (30–50)"];
    return ["g", "Sufficient (50+)"];
  }
  function uviStyle(c) {
    const m = { g:"background:#e8faf0;color:#1a7a3a",
                y:"background:#fff4e0;color:#7a5800",
                o:"background:#fff0e0;color:#7a3500",
                r:"background:#fff0f0;color:#7a1010" };
    return m[c];
  }
  function vdStyle(c) { return uviStyle(c); }
</script>
</body>
</html>
